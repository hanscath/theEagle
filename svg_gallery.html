<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eagle Illustrations Gallery</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 2rem;
    background: #f5f5f7;
    color: #1d1d1f;
  }
  h1 {
    text-align: center;
    margin: 0 0 2rem;
    font-weight: 600;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
    gap: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  figure {
    margin: 0;
    background: #fff;
    border-radius: 12px;
    padding: 1rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  figure img {
    width: 100%;
    height: auto;
    max-height: 300px;
    object-fit: contain;
  }
  figcaption {
    margin-top: 0.75rem;
    font-size: 0.9rem;
    color: #555;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>Eagle Illustrations</h1>
  <div class="gallery">
    <figure>
      <img src="./images/eagle_illustration_1_mac_se.svg" alt="Eagle with Mac SE">
      <figcaption>1. Mac SE</figcaption>
    </figure>
    <figure>
      <img src="./images/eagle_illustration_2_shadow_it.svg" alt="Eagle Shadow IT">
      <figcaption>2. Shadow IT</figcaption>
    </figure>
    <figure>
      <img src="./images/eagle_illustration_3_rollerblades.svg" alt="Eagle on Rollerblades">
      <figcaption>3. Rollerblades</figcaption>
    </figure>
    <figure>
      <img src="./images/eagle_illustration_4_webserver.svg" alt="Eagle Web Server">
      <figcaption>4. Web Server</figcaption>
    </figure>
    <figure>
      <img src="./images/eagle_illustration_5_layout_table.svg" alt="Eagle Layout Table">
      <figcaption>5. Layout Table</figcaption>
    </figure>
  </div>
</body>
</html>
