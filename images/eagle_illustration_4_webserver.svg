<svg width="380" height="240" viewBox="0 0 380 240" xmlns="http://www.w3.org/2000/svg">
<style>
  .ink { fill: none; stroke: #1a1714; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
  .ink-thin { fill: none; stroke: #1a1714; stroke-width: 0.9; stroke-linecap: round; stroke-linejoin: round; }
  .ink-thick { fill: none; stroke: #1a1714; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .fill-ink { fill: #1a1714; }
</style>

<g transform="translate(40, 20)">
  <!-- Desk -->
  <line x1="-20" y1="80" x2="320" y2="80" class="ink-thick"/>
  <line x1="0" y1="80" x2="0" y2="200" class="ink"/>
  <line x1="300" y1="80" x2="300" y2="200" class="ink"/>
  
  <!-- LaserWriter on top of desk -->
  <rect x="80" y="20" width="180" height="60" class="ink-thick" rx="3"/>
  <line x1="90" y1="20" x2="250" y2="20" class="ink"/>
  <line x1="90" y1="25" x2="250" y2="25" class="ink-thin"/>
  <!-- Paper output tray -->
  <rect x="100" y="30" width="140" height="8" class="ink" rx="1"/>
  <!-- Paper sticking out -->
  <path d="M 110 30 L 110 18 L 230 18 L 230 30" class="ink-thin"/>
  <!-- Front panel -->
  <rect x="90" y="55" width="160" height="20" class="ink-thin" rx="1"/>
  <!-- Status lights -->
  <circle cx="100" cy="65" r="2" class="ink-thin"/>
  <circle cx="110" cy="65" r="2" class="fill-ink"/>
  <circle cx="120" cy="65" r="2" class="ink-thin"/>
  <!-- LaserWriter label -->
  <text x="170" y="68" font-family="Helvetica, sans-serif" font-size="7" fill="#1a1714" text-anchor="middle">LaserWriter</text>
  
  <!-- Cable from printer going down to floor -->
  <path d="M 90 80 Q 60 100 50 130 Q 45 170 60 195" class="ink"/>
  
  <!-- Mac tower (webserver) tucked under desk on floor -->
  <rect x="60" y="130" width="50" height="70" class="ink-thick" rx="2"/>
  <line x1="60" y1="145" x2="110" y2="145" class="ink-thin"/>
  <!-- Floppy drive -->
  <rect x="68" y="150" width="34" height="3" class="ink-thin"/>
  <!-- CD drive -->
  <rect x="68" y="158" width="34" height="3" class="ink-thin"/>
  <!-- Power button -->
  <circle cx="85" cy="170" r="2" class="ink-thin"/>
  <!-- Vents -->
  <line x1="68" y1="180" x2="102" y2="180" class="ink-thin"/>
  <line x1="68" y1="184" x2="102" y2="184" class="ink-thin"/>
  <line x1="68" y1="188" x2="102" y2="188" class="ink-thin"/>
  <line x1="68" y1="192" x2="102" y2="192" class="ink-thin"/>
  
  <!-- LED -->
  <circle cx="100" cy="170" r="1.5" class="fill-ink"/>
  
  <!-- Ethernet cable going off to the right -->
  <path d="M 110 165 Q 140 165 160 175 Q 180 185 220 180" class="ink"/>
  
  <!-- Sticky note on tower -->
  <rect x="115" y="135" width="50" height="35" class="ink" rx="1" transform="rotate(-8 140 152)"/>
  <text x="140" y="150" font-family="Helvetica, sans-serif" font-size="6.5" fill="#1a1714" text-anchor="middle" transform="rotate(-8 140 152)">DO NOT</text>
  <text x="140" y="160" font-family="Helvetica, sans-serif" font-size="6.5" fill="#1a1714" text-anchor="middle" transform="rotate(-8 140 152)">TURN OFF</text>
  <text x="140" y="168" font-family="Helvetica, sans-serif" font-size="6.5" fill="#1a1714" text-anchor="middle" transform="rotate(-8 140 152)">!!!</text>
  
  <!-- Floor line -->
  <line x1="-20" y1="200" x2="320" y2="200" class="ink"/>
  
  <!-- Dust bunny hint -->
  <path d="M 200 197 Q 205 192 212 195 Q 218 192 220 197" class="ink-thin"/>
</g>
</svg>
